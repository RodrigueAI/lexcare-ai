sources:
  - source_id: gesetze-im-internet
    name: Gesetze im Internet
    source_type: file
    description: German federal legislation PDFs
    enabled: true
    metadata:
      root_path: data/raw/gesetze_im_internet
      file_pattern: "**/*.pdf"
      document_type: law
      topics:
        - healthcare-law

  - source_id: gba
    name: Gemeinsamer Bundesausschuss
    source_type: rss
    description: Publications and decisions of the G-BA
    enabled: false
    metadata:
      feed_urls: []
      document_type: regulation
      topics:
        - healthcare-regulation

  - source_id: bundestag
    name: Bundestag Open Data
    source_type: api
    description: Parliamentary documents and legislation
    enabled: false
    metadata:
      endpoint: https://example.invalid/api
      document_type: parliamentary
      topics:
        - legislation

  - source_id: bmg-web
    name: Bundesministerium für Gesundheit
    source_type: web
    description: Publications from the Federal Ministry of Health
    enabled: false
    metadata:
      urls: []
      allowed_domains:
        - bundesgesundheitsministerium.de
      document_type: public-web
      topics:
        - healthcare-policy