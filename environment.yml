name: lexcare-ai

channels:
  - conda-forge

dependencies:
  # Python
  - python=3.12
  # Build Tools
  - pip
  - setuptools
  - wheel
  # Jupyter / Notebooks
  - jupyterlab
  - notebook
  - ipykernel
  # Data Processing
  - pandas
  - numpy
  - pydantic
  - python-dotenv
  # API
  - fastapi
  - uvicorn
  # Testing
  - pytest
  - pytest-cov
  # Development
  - black
  - isort
  - mypy
  - ruff
  - pre-commit
  # PDF Processing
  - pypdf

  - pip:
      # LangChain
      - langchain
      - langchain-community
      - langchain-openai
      # Vector DB
      - chromadb
      # Embeddings / Tokenization
      - tiktoken
      # Multipart Uploads (FastAPI)
      - python-multipart
      # HTTP Clients
      - httpx
      - requests
      # Logging
      - structlog
      # Optional RAG Evaluation
      - ragas
      # OpenAI SDK
      - openai
      - feedparser
      - pyspark
      - types-PyYAML